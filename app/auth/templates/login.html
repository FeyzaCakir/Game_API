<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    
    
    <style>
        /* Genel stil */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4f8, #d9e4ec);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Form kutusu */
        form {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Input alanları */
        form input {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        form input:focus {
            border-color: #0078d7;
            box-shadow: 0 0 6px rgba(0,120,215,0.3);
            outline: none;
        }

        /* Buton */
        form button {
            background: #0078d7;
            color: #fff;
            border: none;
            padding: 0.9rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        form button:hover {
            background: #005a9e;
        }

        /* Flash mesajlar */
        .flash-message {
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }

        /* Kategorilere göre renkler */
        .flash-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .flash-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .flash-message.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        /* Link */
        a {
            display: block;
            margin-top: 1rem;
            text-align: center;
            color: #0078d7;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #005a9e;
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash-message {{ category }}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password"   required>
            <button type="submit">LOGIN</button>
        </form>
        <a href="{{url_for('auth_bp.register')}}">SIGN IN</a>
    </div>
    
</body>
</html>
